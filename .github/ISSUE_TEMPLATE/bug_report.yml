name: Bug Report
description: Report a bug with AzPolicyFactory templates, modules, pipelines, or tests
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in the details below to help us investigate and resolve the issue.

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: Which area of the project is affected?
      options:
        - Bicep Templates / Modules
        - Policy Definitions
        - Policy Initiatives
        - Policy Assignments
        - Policy Exemptions
        - Azure DevOps Pipelines
        - GitHub Actions Workflows
        - Tests (Pester / PSRule)
        - Scripts
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure '...'
        2. Run pipeline/workflow '...'
        3. Deploy to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages, logs, or screenshots if applicable.
    validations:
      required: true

  - type: input
    id: bicep-version
    attributes:
      label: Bicep CLI Version
      description: "Output of `az bicep version` or `bicep --version`"
      placeholder: "e.g., Bicep CLI version 0.30.x"
    validations:
      required: false

  - type: input
    id: powershell-version
    attributes:
      label: PowerShell Version
      description: "Output of `$PSVersionTable.PSVersion`"
      placeholder: "e.g., 7.4.x"
    validations:
      required: false

  - type: dropdown
    id: cicd-platform
    attributes:
      label: CI/CD Platform
      description: Which CI/CD platform are you using?
      options:
        - Azure DevOps
        - GitHub Actions
        - Both
        - N/A
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or log output relevant to the issue.
    validations:
      required: false

requires:
  # Require a minimum of PSRule for Azure v1.47.0
  PSRule.Rules.Azure: ">=1.47.0"
include:
  module:
    - PSRule.Rules.Azure
input:
  pathIgnore:
    - modules/
    - bicepconfig.json
execution:
  unprocessedObject: Ignore
configuration:
  AZURE_RESOURCE_GROUP:
    location: 'australiaeast'
  # Enable expansion of Azure Template files.
  AZURE_PARAMETER_FILE_EXPANSION: true
  # Enable expansion of Azure Bicep files.
  AZURE_BICEP_FILE_EXPANSION: true

rule:
  # Enable custom rules that don't exist in the baseline
  includeLocal: true
  exclude:
    # Ignore the following rules for all resources
    - Azure.KeyVault.Logs #deployed by policy
    - Azure.Template.Resources # won't work with conditional resources
    - Azure.Template.UseDescriptions
